name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: tana-mcp-codemode-linux-x64
          - target: bun-linux-arm64
            artifact: tana-mcp-codemode-linux-arm64
          - target: bun-darwin-x64
            artifact: tana-mcp-codemode-darwin-x64
          - target: bun-darwin-arm64
            artifact: tana-mcp-codemode-darwin-arm64
          - target: bun-windows-x64
            artifact: tana-mcp-codemode-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile --target=${{ matrix.target }} src/entry-bun.ts --outfile dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  create-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
